<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pump Log Sheet - MED Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0f172a;
      /* Slate 900 */
      --bg-card: #1e293b;
      /* Slate 800 */
      --bg-input: #0f172a;
      --text-main: #f8fafc;
      /* Slate 50 */
      --text-muted: #94a3b8;
      /* Slate 400 */
      --accent: #6366f1;
      /* Indigo 500 */
      --accent-hover: #4f46e5;
      /* Indigo 600 */
      --emerald: #10b981;
      --border-color: #334155;
      /* Slate 700 */
      --border-active: #6366f1;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --radius-lg: 12px;
      --radius-md: 8px;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      letter-spacing: -0.01em;
    }

    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
      color: var(--text-muted);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border-color);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 32px;
      background: #111827;
      /* Rich dark header */
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 100;
      box-sizing: border-box;
    }

    .top-bar-brand {
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .top-bar-brand::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 2px;
    }

    .nav-actions {
      display: flex;
      gap: 8px;
    }

    .nav-actions button {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      padding: 8px 14px;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--text-main);
      border-radius: var(--radius-md);
      transition: all 0.15s ease;
      font-weight: 500;
    }

    .nav-actions button:hover {
      background: var(--border-color);
      border-color: var(--text-muted);
    }

    #download-btn {
      background: var(--accent);
      border-color: var(--accent);
    }

    #download-btn:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .container {
      max-width: 1000px;
      width: calc(100% - 32px);
      margin: 32px auto;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: var(--shadow);
      box-sizing: border-box;
    }

    .academic-header {
      text-align: left;
      margin-bottom: 32px;
    }

    .affiliation {
      font-size: 0.75rem;
      margin: 0 0 8px 0;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }

    .academic-header h1 {
      font-size: 1.75rem;
      margin: 0 0 6px 0;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -0.02em;
    }

    .academic-header h2 {
      font-size: 1.1rem;
      margin: 0;
      font-weight: 400;
      color: var(--text-muted);
    }

    .heavy-rule {
      border: 0;
      border-top: 1px solid var(--border-color);
      margin-top: 24px;
    }

    .light-rule {
      border: 0;
      border-top: 1px solid var(--border-color);
      margin: 40px 0;
    }

    .form-section {
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      margin: 24px 0;
      padding: 24px;
      background: rgba(15, 23, 42, 0.4);
    }

    .form-section legend {
      font-weight: 600;
      font-size: 0.75rem;
      padding: 0 8px;
      color: var(--text-main);
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .form-group-inline {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: .75rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 0.9rem;
      color: var(--text-main);
      background: var(--bg-input);
      box-sizing: border-box;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--border-active);
      box-shadow: 0 0 0 1px var(--border-active);
    }

    .pump-box {
      margin-bottom: 16px;
      display: grid;
      grid-template-columns: 180px 1fr;
      align-items: center;
      padding: 16px;
      background: rgba(15, 23, 42, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.02);
      border-radius: var(--radius-md);
    }

    .pump-box h4 {
      margin: 0;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-main);
    }

    .time-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    input[type="date"],
    input[type="time"] {
      color-scheme: dark;
    }

    .action-row {
      margin-top: 16px;
      display: flex;
      justify-content: flex-end;
    }

    #save-status {
      font-size: .75rem;
      font-weight: 500;
      padding: 6px 12px;
      background: #0f172a;
      border: 1px solid var(--border-color);
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
    }

    .recent-section {
      margin-top: 40px;
    }

    .recent-section h3 {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    .academic-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .85rem;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .academic-table th,
    .academic-table td {
      padding: 12px 16px;
      text-align: left;
    }

    .academic-table th {
      background: #111827;
      border-bottom: 1px solid var(--border-color);
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      font-size: .7rem;
      letter-spacing: .05em;
    }

    .academic-table td {
      border-bottom: 1px solid var(--border-color);
      background: rgba(30, 41, 59, 0.5);
    }

    .academic-table tr:last-child td {
      border-bottom: none;
    }

    .station-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .station-item {
      padding: 20px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.15s ease;
      background: rgba(15, 23, 42, 0.2);
    }

    .station-item:hover {
      border-color: var(--border-active);
      background: rgba(15, 23, 42, 0.5);
    }

    .station-item h3 {
      margin: 0 0 6px 0;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-main);
    }

    .station-item p {
      margin: 0;
      color: var(--text-muted);
      font-size: .8rem;
    }

    /* Operational Login Theme Layout */
    .login-card {
      max-width: 360px;
      margin: 60px auto;
      padding: 32px;
      background: #111827;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
    }

    .login-btn {
      width: 100%;
      padding: 10px;
      font-size: 0.9rem;
      cursor: pointer;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-weight: 500;
      transition: background 0.15s ease;
    }

    .login-btn:hover {
      background: var(--accent-hover);
    }

    @media(max-width:768px) {
      .container {
        padding: 24px 16px;
        margin: 16px auto;
        width: calc(100% - 16px);
      }

      .top-bar {
        padding: 12px 16px;
      }

      .pump-box {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .academic-table {
        display: block;
        overflow-x: auto;
        white-space: nowrap
      }
    }
  </style>
</head>

<body>
  <div id="loading" class="loading-container">
    <div class="spinner"></div>
    <p style="font-size: 0.9rem;">Initializing System...</p>
  </div>
  <div class="top-bar" id="nav" style="display:none">
    <div class="top-bar-brand">MED Portal</div>
    <div class="nav-actions">
      <button id="back-btn" onclick="goBack()" style="display:none">&larr; Stations</button>
      <button id="download-btn" onclick="downloadExcel()" style="display:none">Export Data (.xlsx)</button>
      <button id="logout-btn" onclick="logout()" style="display:none">Sign Out</button>
    </div>
  </div>
  <div class="container" id="app-container" style="display:none">
    <header class="academic-header">
      <p class="affiliation">Metropolitan Electrical Division, Irrigation &amp; Waterways Directorate</p>
      <h1 id="header-main-title">Digital Log Sheet Operational Portal</h1>
      <h2 id="header-title">Station Selection</h2>
      <hr class="heavy-rule">
    </header>

    <div id="view-login" style="display:none">
      <div class="login-card">
        <h3
          style="text-align:left; font-weight: 600; margin: 0 0 24px 0; font-size: 1.1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 12px;">
          Agency Authentication</h3>
        <div class="form-group" style="margin-bottom: 16px;">
          <label>Username</label>
          <input type="text" id="login-user" onkeydown="if(event.key === 'Enter') login()">
        </div>
        <div class="form-group" style="margin-bottom: 24px;">
          <label>Password</label>
          <input type="password" id="login-pass" onkeydown="if(event.key === 'Enter') login()">
        </div>
        <div>
          <button class="login-btn" onclick="login()">Sign In</button>
        </div>
        <div id="login-error"
          style="color:#f87171; text-align:left; margin-top: 14px; font-size: 0.8rem; font-weight: 500;"></div>
      </div>
    </div>

    <div id="view-select" style="display:none">
      <div id="list-container" class="station-grid"></div>
    </div>
    <div id="view-form" style="display:none">
      <div id="data-form">
        <fieldset class="form-section">
          <legend>General Parameters</legend>
          <div class="form-group-inline">
            <div class="form-group"><label>Date of Observation *</label><input type="date" id="f-date" required></div>
            <div class="form-group"><label>Operator / Recorder Name</label><input type="text" id="f-name"
                placeholder="Enter Full Name"></div>
          </div>
        </fieldset>
        <fieldset class="form-section">
          <legend>Pump Runtime Logs (24-Hour Format)</legend>
          <div id="pump-inputs"></div>
        </fieldset>
        <div class="action-row"><span id="save-status">Live Sync: Active</span></div>
      </div>
      <div class="recent-section">
        <hr class="light-rule">
        <h3>Historical Metrics Log</h3>
        <div id="recent-list"></div>
      </div>
    </div>
  </div>

  <script>
    var currentStation = '', stations = [];

    function getAuthHeader() {
      var t = localStorage.getItem('authToken');
      return t ? { 'Authorization': 'Basic ' + t } : {};
    }

    function login() {
      var u = document.getElementById('login-user').value;
      var p = document.getElementById('login-pass').value;
      if (!u || !p) return;
      var token = btoa(u + ':' + p);

      document.getElementById('login-error').innerText = 'Authenticating...';

      fetch('/api/login', {
        headers: { 'Authorization': 'Basic ' + token }
      })
        .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d } }); })
        .then(function (res) {
          if (res.ok) {
            localStorage.setItem('authToken', token);
            document.getElementById('login-error').innerText = '';
            loadLocations();
          } else {
            document.getElementById('login-error').innerText = res.data.error || 'Invalid credentials';
          }
        })
        .catch(function () { document.getElementById('login-error').innerText = 'Network Error'; });
    }

    function logout() {
      localStorage.removeItem('authToken');
      location.reload();
    }

    function downloadExcel() {
      var t = localStorage.getItem('authToken');
      if (t) {
        window.open('/api/download?token=' + encodeURIComponent(t));
      } else {
        alert('Please log in to download the log sheet.');
      }
    }

    window.onload = function () {
      document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
      var n = localStorage.getItem('opName');
      if (n) document.getElementById('f-name').value = n;

      document.getElementById('loading').style.display = 'none';
      document.getElementById('nav').style.display = 'flex';
      document.getElementById('app-container').style.display = 'block';

      if (localStorage.getItem('authToken')) {
        loadLocations();
      } else {
        document.getElementById('view-login').style.display = 'block';
      }
    };

    function loadLocations() {
      document.getElementById('view-login').style.display = 'none';
      document.getElementById('view-select').style.display = 'block';
      document.getElementById('logout-btn').style.display = 'inline-block';
      document.getElementById('download-btn').style.display = 'inline-block';
      document.getElementById('list-container').innerHTML = '<p class="center-text">Loading locations...</p>';

      fetch('/api/locations', { headers: getAuthHeader() })
        .then(function (r) { if (r.status === 401) logout(); return r.json(); })
        .then(function (d) {
          stations = d.locations || [];
          renderList();
        })
        .catch(function (e) { console.error(e); document.getElementById('list-container').innerHTML = '<p class="center-text" style="color:#f87171">Error loading stations.</p>'; });
    }

    function renderList() {
      var h = '';
      for (var i = 0; i < stations.length; i++) {
        var s = stations[i];
        h += '<div class="station-item" onclick="openStation(\'' + s.sheetName + '\',\'' + s.displayName + '\')">' +
          '<h3>' + s.displayName + '</h3>' +
          '<p>Recorded entries: ' + s.entriesCount + ' / ' + s.maxEntries + '</p></div>';
      }
      document.getElementById('list-container').innerHTML = h;
    }

    function openStation(id, name) {
      currentStation = id;
      document.getElementById('header-title').innerText = name;
      document.getElementById('view-select').style.display = 'none';
      document.getElementById('view-form').style.display = 'block';
      document.getElementById('back-btn').style.display = 'inline-block';
      var h = '';
      for (var i = 1; i <= 5; i++) {
        h += '<div class="pump-box"><h4>Pump Unit ' + i + '</h4>' +
          '<div class="time-row">' +
          '<div class="form-group"><label>Start Time</label><input type="time" id="p' + i + '-start"></div>' +
          '<div class="form-group"><label>Stop Time</label><input type="time" id="p' + i + '-stop"></div>' +
          '</div></div>';
      }
      document.getElementById('pump-inputs').innerHTML = h;
      var inputs = document.querySelectorAll('#data-form input');
      for (var j = 0; j < inputs.length; j++) inputs[j].addEventListener('input', saveLive);
      document.getElementById('f-date').addEventListener('change', function () { clearForm(); loadRecent(); });
      loadRecent();
    }

    function clearForm() {
      for (var i = 1; i <= 5; i++) {
        document.getElementById('p' + i + '-start').value = '';
        document.getElementById('p' + i + '-stop').value = '';
      }
    }

    function goBack() {
      document.getElementById('header-title').innerText = 'Station Selection';
      document.getElementById('view-select').style.display = 'block';
      document.getElementById('view-form').style.display = 'none';
      document.getElementById('back-btn').style.display = 'none';
    }

    var saveTimeout = null;
    function saveLive() {
      clearTimeout(saveTimeout);
      var st = document.getElementById('save-status');
      if (!st) return;
      st.innerText = 'Live Sync: Saving...'; st.style.color = '#fbbf24';
      saveTimeout = setTimeout(function () {
        var date = document.getElementById('f-date').value;
        var name = document.getElementById('f-name').value;
        if (!date) { st.innerText = 'Date required'; st.style.color = '#f87171'; return; }
        var pumps = {}, hasData = false;
        for (var i = 1; i <= 5; i++) {
          var a = document.getElementById('p' + i + '-start').value;
          var b = document.getElementById('p' + i + '-stop').value;
          if (a || b) { hasData = true; pumps[i] = { start: a, stop: b }; }
        }
        if (!hasData) { st.innerText = 'Live Sync: Ready'; st.style.color = '#94a3b8'; return; }
        localStorage.setItem('opName', name);
        fetch('/api/entry', {
          method: 'POST',
          headers: Object.assign({ 'Content-Type': 'application/json' }, getAuthHeader()),
          body: JSON.stringify({ sheetName: currentStation, date: date, pumps: pumps, operatorName: name })
        })
          .then(function (r) { return r.json(); })
          .then(function (d) {
            if (d.success) { st.innerText = 'Saved \u2713'; st.style.color = '#34d399'; loadRecent(); }
            else { st.innerText = 'Error: ' + (d.error || 'Failed'); st.style.color = '#f87171'; }
          })
          .catch(function () { st.innerText = 'Network error'; st.style.color = '#f87171'; });
      }, 1000);
    }

    function loadRecent() {
      fetch('/api/recent?sheet=' + currentStation, { headers: getAuthHeader() })
        .then(function (r) { return r.json(); })
        .then(function (d) {
          var h = '';
          if (!d.entries || d.entries.length === 0) {
            h = '<p style="text-align:center;font-style:italic;color:#94a3b8">No observations recorded yet.</p>';
          } else {
            h = '<table class="academic-table"><thead><tr><th>Date</th><th>Operator</th><th>P1</th><th>P2</th><th>P3</th><th>P4</th><th>P5</th></tr></thead><tbody>';
            for (var i = 0; i < d.entries.length; i++) {
              var row = d.entries[i];
              h += '<tr><td><strong>' + row.date + '</strong></td><td>' + (row.operator || '\u2014') + '</td>';
              for (var p = 1; p <= 5; p++) {
                var pm = row.pumps[p];
                h += '<td>' + ((pm && (pm.start || pm.stop)) ? (pm.start || '-') + ' \u2192 ' + (pm.stop || '-') : '\u2014') + '</td>';
              }
              h += '</tr>';
            }
            h += '</tbody></table>';
          }
          document.getElementById('recent-list').innerHTML = h;

          var cd = document.getElementById('f-date').value;
          var td = d.entries && d.entries.find(function (e) { return e.date === cd; });
          var empty = true;
          for (var i = 1; i <= 5; i++) {
            if (document.getElementById('p' + i + '-start').value || document.getElementById('p' + i + '-stop').value) { empty = false; break; }
          }
          if (td && empty) {
            for (var i = 1; i <= 5; i++) {
              var pp = td.pumps[i];
              if (pp) {
                if (pp.start) document.getElementById('p' + i + '-start').value = pp.start;
                if (pp.stop) document.getElementById('p' + i + '-stop').value = pp.stop;
              }
            }
          }
        })
        .catch(function (e) { console.log('err', e); });
    }
  </script>
</body>

</html>
